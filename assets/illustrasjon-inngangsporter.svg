<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" role="img" aria-label="Mind map som viser et merke i sentrum med seks kategori-inngangsporter rundt seg">
  <style>
    .label { font-family: 'Sohne', -apple-system, system-ui, 'Helvetica Neue', Arial, sans-serif; }
    .center-label { font-weight: 700; font-size: 22px; letter-spacing: 0.05em; fill: #FBE8D0; text-transform: uppercase; }
    .node-label { font-weight: 500; font-size: 15px; fill: #222640; }
    .legend { font-weight: 600; font-size: 12px; fill: #5A5A5A; text-transform: uppercase; letter-spacing: 0.12em; }
    .line { stroke: #222640; stroke-width: 1.5; fill: none; }
    .node { fill: #FFFFFF; stroke: #DD6B6E; stroke-width: 1.75; }
    .center-circle { fill: #222640; }
  </style>

  <!-- Tittel-tekst over (subtil) -->
  <text x="40" y="42" class="label legend">Kategori: brus</text>

  <!-- Linjer fra sentrum til hver inngangsport (under nodene så de ikke krysser) -->
  <line class="line" x1="400" y1="260" x2="400" y2="100"/>
  <line class="line" x1="400" y1="260" x2="640" y2="160"/>
  <line class="line" x1="400" y1="260" x2="640" y2="360"/>
  <line class="line" x1="400" y1="260" x2="400" y2="465"/>
  <line class="line" x1="400" y1="260" x2="160" y2="360"/>
  <line class="line" x1="400" y1="260" x2="160" y2="160"/>

  <!-- Sentrums-merke -->
  <circle class="center-circle" cx="400" cy="260" r="64"/>
  <text x="400" y="267" text-anchor="middle" class="label center-label">Merke</text>

  <!-- Inngangsporter (pill-form) — bredde tilpasset tekst -->
  <!-- Top: Etter trening -->
  <rect class="node" x="318" y="78" width="164" height="44" rx="22" ry="22"/>
  <text x="400" y="106" text-anchor="middle" class="label node-label">Etter trening</text>

  <!-- Upper right: Pizza med familien -->
  <rect class="node" x="528" y="138" width="224" height="44" rx="22" ry="22"/>
  <text x="640" y="166" text-anchor="middle" class="label node-label">Pizza med familien</text>

  <!-- Lower right: Lang bilreise -->
  <rect class="node" x="538" y="338" width="204" height="44" rx="22" ry="22"/>
  <text x="640" y="366" text-anchor="middle" class="label node-label">Lang bilreise</text>

  <!-- Bottom: Fredagsfilm hjemme -->
  <rect class="node" x="288" y="443" width="224" height="44" rx="22" ry="22"/>
  <text x="400" y="471" text-anchor="middle" class="label node-label">Fredagsfilm hjemme</text>

  <!-- Lower left: Lunsj på jobben -->
  <rect class="node" x="50" y="338" width="220" height="44" rx="22" ry="22"/>
  <text x="160" y="366" text-anchor="middle" class="label node-label">Lunsj på jobben</text>

  <!-- Upper left: Henge med guttegjengen -->
  <rect class="node" x="24" y="138" width="272" height="44" rx="22" ry="22"/>
  <text x="160" y="166" text-anchor="middle" class="label node-label">Henge med guttegjengen</text>
</svg>
